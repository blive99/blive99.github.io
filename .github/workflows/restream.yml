name: Restream M3U8

on:
  workflow_dispatch:   # กดรันเอง

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Install FFmpeg
        run: sudo apt update && sudo apt install ffmpeg -y

      - name: Restream
        run: |
          ffmpeg -re -i "https://example.com/source.m3u8" \
          -c copy \
          -f hls \
          -hls_time 6 \
          -hls_list_size 5 \
          index.m3u8

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: stream-output
          path: |
            *.m3u8
            *.ts
