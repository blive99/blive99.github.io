<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TSN1 Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<video id="video" controls autoplay width="100%"></video>

<script>
const video = document.getElementById('video');
const url = 'https://apiiptv.lnwthailive.online/api/play/stream.m3u8?c=ca-tsn1';

if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
}
</script>

</body>
</html>
