<!-- Module script to initialize Vidstack player with P2P Media Loader -->
<script type="module">
	import { VidstackPlayer, VidstackPlayerLayout, MediaRemoteControl } from 'https://cdn.vidstack.io/player';

		import { HlsJsP2PEngine } from "p2p-media-loader-hlsjs";
	
	const player = await VidstackPlayer.create({
		target: '#media-player',
		title: 'WC 2026 01',
		src: clear_url,
		autoplay: true,
		muted: false,
		playsinline: true,
		layout: new VidstackPlayerLayout({
			
		}),
	});

	const remote = new MediaRemoteControl();

		// Inject P2P capabilities into Hls.js
	const HlsWithP2P = HlsJsP2PEngine.injectMixin(window.Hls);

	
	player.addEventListener("provider-change", (event) => {
		const provider = event.detail;

		// Check if the provider is HLS
		if (provider?.type === "hls") {
			provider.library = HlsWithP2P;

			provider.config = {
				p2p: {
					core: {
						swarmId: 'ex_wc2026-01_480',
																		httpDownloadTimeWindow: 300,
						highDemandTimeWindow: 30,
						simultaneousP2PDownloads: 5,
						p2pDownloadTimeWindow: 12000,
						p2pInactiveLoaderDestroyTimeoutMs: 60 * 1000, // 60 seconds
						p2pErrorRetries: 5,
						// announceTrackers: [
						// 	"wss://tracker-x02.love2watch.org:8433",
						// 	"wss://tracker-x02.love2watch.org:8433",
						// ],
						rtcConfig: {
							//iceCandidatePoolSize: 5,
							iceServers: [

								{ urls: ["stun:stun3.l.google.com:19302"] },
								{ urls: ["stun.cloudflare.com:3478"] },

							],
						},
					},
					onHlsJsCreated: (hls) => {

						hls.p2pEngine.addEventListener("onPeerConnect", (params) => {
						console.log("Peer connected:", params.peerId);
						current_peers.push(params.peerId);
							peers_connected++;
						});
						
						hls.p2pEngine.addEventListener("onPeerClose", (params) => {
							current_peers = current_peers.filter(function(e) { return e !== params.peerId })
							peers_connected--;
						});

						hls.p2pEngine.addEventListener("onChunkUploaded", (bytesLength) => {
							p2p_upload_total += bytesLength;
						});

						hls.p2pEngine.addEventListener("onSegmentLoaded", (params) => {

							$('#buffering_info').hide();

							segment_count++;

							console.log(params);

							params.peerId ? p2p_download_total += params.bytesLength : cdn_download_total += params.bytesLength;
							params.peerId ? segments_p2p++ : segments_http++;

							if (last_10_segments.length >= 10){
								last_10_segments.shift();
							}
							if (p2p_download_size.length >= 10){
								p2p_download_size.shift();
							}
							if (cdn_download_size.length >= 10){
								cdn_download_size.shift();
							}

							if (last_10_segments_time.length >= 10){
								last_10_segments_time.shift();
							}

							last_10_segments_time.push(Date.now());

							params.peerId ? last_10_segments.push("p") : last_10_segments.push("c");
							params.peerId ? p2p_download_size.push(params.bytesLength) : cdn_download_size.push(params.bytesLength);
							params.peerId ? cdn_download_size.push(0) : p2p_download_size.push(0);


							p2p_ratio = ((p2p_download_total / (p2p_download_total + cdn_download_total)) * 100);

							var seg_p2p = 0;
							var seg_cdn = 0;
							var bw_p2p = 0;
							var bw_cdn = 0;
							var bw_total = 0;

							$.each(last_10_segments, function (index, value) {
								if (value == 'p'){
									seg_p2p++;
								} else {
									seg_cdn++;
								}
							});

							$.each(p2p_download_size, function (index, value) {
								bw_p2p += value;
							});

							$.each(cdn_download_size, function (index, value) {
								bw_cdn += value;
							});

							p2p_ratio_10seg = ((bw_p2p / (bw_p2p + bw_cdn)) * 100);

							console.log("Total Segments: " + segment_count);
							console.log("Last " + last_10_segments.length + " segments: " + last_10_segments.toString());
							console.log("Last " + last_10_segments_time.length + " segments time: " + last_10_segments_time.toString());
							console.log("Total P2P DL: " + p2p_download_total);
							console.log("Total P2P UL: " + p2p_upload_total);
							console.log("Total CDN DL: " + cdn_download_total);
							console.log("Recent P2P DL: " + bw_p2p);
							console.log("Recent CDN DL: " + bw_cdn);
							console.log("Peers: " + current_peers.length);
							console.log('P2P % (total): ' + Math.round(p2p_ratio));
							console.log('P2P % (current): ' + Math.round(p2p_ratio_10seg));


						});

					},
				},
			};
		}

	});

	
	player.addEventListener('load-start', (event) => {

		console.log('load-start');

		
		
		
		startCountdown();

	function startCountdown(){
		var timeleft = 3;

		var countdown = setInterval(function() {

			$("#skip").html("รอสักครู่... " + timeleft);

			timeleft--;

			if (timeleft < 0) {
				clearInterval(countdown);
				$("#skip").html("ข้ามโฆษณา");
				$("#skip").prop("disabled", false);
			}


		}, 1000);


	}

</script>

	function nFormatter(num, digits) {
		const lookup = [
			{ value: 1, symbol: "" },
			{ value: 1e3, symbol: "k" },
			{ value: 1e6, symbol: "M" },
			{ value: 1e9, symbol: "G" },
			{ value: 1e12, symbol: "T" },
			{ value: 1e15, symbol: "P" },
			{ value: 1e18, symbol: "E" }
		];
		const regexp = /\.0+$|(?<=\.[0-9]*[1-9])0+$/;
		const item = lookup.findLast(item => num >= item.value);
		return item ? (num / item.value).toFixed(digits).replace(regexp, "").concat(item.symbol) : "0";
	}
